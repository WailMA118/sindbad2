<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sindbad – Explore</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    /* =============================================
       CSS Variables – Single source of truth
       ============================================= */
    :root {
      --blue:   #1E3A8A;
      --gold:   #D4AF37;
      --brown:  #8B5A2B;
      --olive:  #6B8E23;
      --cream:  #F8F5F0;
      --white:  #ffffff;
      --dark:   #1a1a1a;
      --radius: 14px;
    }

    /* =============================================
       General
       ============================================= */
    body {
      background-color: var(--cream);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main { flex: 1; }

    /* =============================================
       Navbar
       ============================================= */
    .navbar-sindbad {
      background-color: var(--blue);
    }

    .navbar-sindbad .navbar-brand {
      color: var(--gold);
      font-weight: 700;
      font-size: 19px;
    }

    .navbar-sindbad .nav-link {
      color: rgba(255, 255, 255, 0.85) !important;
      border-radius: 20px;
      padding: 4px 14px !important;
    }

    .navbar-sindbad .nav-link:hover,
    .navbar-sindbad .nav-link.active {
      color: var(--white) !important;
      background-color: rgba(255, 255, 255, 0.15);
    }

    .btn-logout {
      background-color: #c0392b;
      color: var(--white);
      border: none;
      border-radius: 20px;
      padding: 5px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-logout:hover { opacity: 0.85; }

    /* =============================================
       Filter Bar
       
       Bootstrap d-flex + flex-wrap handles the row.
       Custom styles only for the pill/input appearance.
       ============================================= */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filter-pill {
      background-color: var(--white);
      color: #333;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 5px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .filter-pill:hover,
    .filter-pill.active {
      background-color: var(--blue);
      color: var(--white);
      border-color: var(--blue);
    }

    /* Search input – pushed to the right via margin-left: auto */
    .search-input {
      margin-left: auto;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 14px;
      outline: none;
      width: 210px;
      background-color: var(--white);
    }

    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.15);
    }

    /* Full-width on very small screens */
    @media (max-width: 480px) {
      .search-input {
        width: 100%;
        margin-left: 0;
      }
    }

    /* =============================================
       Trip / Hotel Cards  – CSS Grid Layout
       
       CSS Grid is chosen here because:
       1. We need a strict 3-column layout on desktop
       2. We need a 2-column layout on mobile
       3. aspect-ratio: 1/1 on grid items works perfectly
          (Bootstrap cols don't enforce equal square heights)
       ============================================= */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* 2 columns on small screens */
    @media (max-width: 576px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .trip-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 1 / 1;       /* square cell – CSS Grid makes this reliable */
      cursor: pointer;
      background-color: #333;
    }

    .trip-card:hover {
      transform: scale(1.02);
      transition: transform 0.2s ease;
    }

    .trip-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }

    /* Text overlay gradient at bottom of card */
    .trip-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.72));
      color: var(--white);
    }

    .trip-card-overlay h6 {
      margin: 0 0 2px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trip-card-overlay small {
      font-size: 12px;
      opacity: 0.88;
    }

    /* =============================================
       Pagination Bar
       ============================================= */
    .pagination-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      margin-top: 24px;
    }

    .page-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background-color: var(--white);
      font-size: 14px;
      cursor: pointer;
      color: #333;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .page-btn:hover {
      background-color: var(--blue);
      color: var(--white);
    }

    .page-btn.active {
      background-color: var(--blue);
      color: var(--white);
      font-weight: 700;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .page-btn.dots {
      background: transparent;
      cursor: default;
    }

    /* =============================================
       Footer
       ============================================= */
    .footer-sindbad {
      background-color: var(--blue);
      padding: 30px 0 20px;
      margin-top: auto;
      color: var(--white);
    }

    .footer-logo-circle {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 8px;
      color: var(--gold);
    }

    .footer-brand-name {
      font-weight: 700;
      font-size: 16px;
      color: var(--gold);
      text-align: center;
    }

    .footer-socials a {
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      margin: 0 5px;
      text-decoration: none;
    }

    .footer-socials a:hover { color: var(--gold); }

    .footer-box h6 {
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
      font-size: 14px;
    }

    .footer-box a {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 13px;
      line-height: 2.1;
    }

    .footer-box a:hover { color: var(--gold); }

    /* =============================================
       Spinner / Empty
       ============================================= */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    .empty-msg {
      text-align: center;
      color: #777;
      padding: 40px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- ======== NAVBAR ======== -->
  <nav class="navbar navbar-sindbad navbar-expand-md">
    <div class="container">

      <a class="navbar-brand d-flex align-items-center gap-2" href="base.html">
        <span>⛵</span>
        Sindbad
      </a>

      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list fs-4 text-white"></i>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Hotels</a></li>
        </ul>
        <div>
          <button class="btn-logout" onclick="window.location='base.html'">Logout</button>
        </div>
      </div>

    </div>
  </nav>


  <main class="container py-4">

    <!-- ======== FILTER BAR ======== -->
    <!--
      Bootstrap d-flex gap-2 flex-wrap handles the row.
      margin-left: auto on .search-input pushes it to the far right.
      <label class="visually-hidden"> fixes the accessibility issue:
      screen readers can announce the field purpose without visual clutter.
    -->
    <div class="filter-bar" role="toolbar" aria-label="Trip filters">

      <!-- Sort pills -->
      <button class="filter-pill active" data-sort="explore">Explore</button>
      <button class="filter-pill"        data-sort="rate">Rate</button>
      <button class="filter-pill"        data-sort="booked">Most booked</button>

      <!-- Accessible search field -->
      <label class="visually-hidden" for="search-input">Search trips or cities</label>
      <input type="search"
             id="search-input"
             class="search-input"
             placeholder="Search trips or cities..."
             aria-label="Search trips or cities" />
    </div>


    <!-- ======== TRIPS GRID ======== -->
    <!--
      CSS Grid: 3 equal columns on desktop, 2 on mobile.
      aspect-ratio: 1/1 on .trip-card creates perfect squares
      without needing a fixed height – more flexible than Bootstrap cols.
    -->
    <div class="card-grid" id="trips-grid">
      <!-- filled by explore.js -->
    </div>


    <!-- ======== PAGINATION ======== -->
    <!--
      Bootstrap d-flex justify-content-center could be used here,
      but .pagination-bar has its own style for the circular page buttons.
    -->
    <div class="pagination-bar" id="pagination-bar" role="navigation" aria-label="Page navigation">
      <!-- filled by explore.js -->
    </div>

  </main>


  <!-- ======== FOOTER ======== -->
  <footer class="footer-sindbad mt-4">
    <div class="container">
      <div class="row g-3 align-items-stretch">

        <!-- Brand -->
        <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
          <div class="footer-logo-circle">⛵</div>
          <div class="footer-brand-name">Sindbad</div>
          <div class="footer-socials mt-2 text-center">
            <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
          </div>
        </div>

        <!-- Company -->
        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Company</h6>
            <a href="#">About us</a>
            <a href="#">Our team</a>
            <a href="#">Contact</a>
          </div>
        </div>

        <!-- Contact -->
        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Contact</h6>
            <a href="#">Phone</a>
            <a href="#">Email</a>
            <a href="#">Location</a>
          </div>
        </div>

      </div>
    </div>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/explore.js"></script>

</body>
</html>
