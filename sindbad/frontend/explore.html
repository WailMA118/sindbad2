<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sindbad – Explore</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- My custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ======== NAVBAR ======== -->
  <nav class="navbar navbar-sindbad navbar-expand-md">
    <div class="container">

      <a class="navbar-brand" href="base.html">
        <span class="brand-icon">⛵</span>
        Sindbad
      </a>

      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list fs-4 text-white"></i>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Hotels</a></li>
        </ul>
        <div>
          <button class="btn-logout" onclick="window.location='base.html'">Logout</button>
        </div>
      </div>

    </div>
  </nav>


  <main class="container py-4">

    <!-- ======== FILTER BAR ======== -->
    <!-- Sort buttons + search input -->
    <div class="filter-bar">
      <button class="filter-pill active" data-sort="explore">Explore</button>
      <button class="filter-pill" data-sort="rate">Rate</button>
      <button class="filter-pill" data-sort="booked">Most booked</button>
      <!-- Search box -->
      <input type="text" id="search-input" class="search-input"
             placeholder="🔍 Search trips or cities..." />
    </div>


    <!-- ======== TRIPS GRID ======== -->
    <!-- 9 trips per page, filled by explore.js -->
    <div class="card-grid" id="trips-grid">
      <!-- filled by explore.js -->
    </div>


    <!-- ======== PAGINATION ======== -->
    <div class="pagination-bar" id="pagination-bar"></div>

  </main>


  <!-- ======== FOOTER ======== -->
  <footer class="footer-sindbad mt-4">
    <div class="container">
      <div class="row g-3 align-items-stretch">

        <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
          <div class="footer-brand">
            <div class="footer-logo-circle">⛵</div>
            <div class="footer-brand-name">Sindbad</div>
            <div class="footer-socials mt-2">
              <a href="#"><i class="bi bi-instagram"></i></a>
              <a href="#"><i class="bi bi-facebook"></i></a>
              <a href="#"><i class="bi bi-twitter-x"></i></a>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Company</h6>
            <a href="#">About us</a>
            <a href="#">Our team</a>
            <a href="#">Contact</a>
          </div>
        </div>

        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Contact</h6>
            <a href="#">Phone</a>
            <a href="#">Email</a>
            <a href="#">Location</a>
          </div>
        </div>

      </div>
    </div>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/explore.js"></script>

</body>
</html>
