<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sindbad</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <style>
        /* =============================================
       CSS Variables – Single source of truth
       ============================================= */
        :root {
            --blue: #1E3A8A;
            /*  الوان من الهوية الفلسطينية مثل لون بلاط قبة الصخرة ولون القبة ولون اوراق وشجر الزيتون */
            --gold: #D4AF37;
            --brown: #8B5A2B;
            --olive: #6B8E23;
            --cream: #F8F5F0;
            --white: #ffffff;
            --dark: #1a1a1a;
            --radius: 14px;
        }

        /* General styles */
        body {
            background-color: var(--cream);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        /* Navbar styles */
        .navbar-sindbad {
            background-color: var(--blue);
        }

        .navbar-sindbad .navbar-logo {
            color: var(--gold);
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
        }

        .navbar-sindbad .nav-link {
            color: var(--white) !important;
            border-radius: var(--radius);
            padding: 6px 40px !important;
        }

        .navbar-sindbad .nav-link:hover,
        .navbar-sindbad .nav-link.active {
            color: var(--white) !important;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-logout {
            background-color: darkred;
            color: var(--gold);
            border: none;
            border-radius: var(--radius);
            padding: 5px 18px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-logout:hover {
            background-color: red;
        }

        /* Carousel styles from BootstrapMade website*/
        .carousel-sindbad {
            border-radius: var(--radius);
            overflow: hidden;
        }

        .carousel-sindbad .carousel-item {
            height: 260px;
        }

        .carousel-slide {
            width: 100%;
            height: 260px;
            background-color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .carousel-slide img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.65;
        }

        .carousel-slide-text {
            position: relative;
            z-index: 2;
            color: var(--white);
            text-align: center;
            margin-bottom: 40px;
            max-width: 580px;
        }

        .carousel-slide-text h4 {
            font-weight: 700;
            font-size: 19px;
            margin-bottom: 6px;
            color: var(--gold);
        }

        .carousel-slide-text p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
            /* Limit text to 3 lines */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Section header styles */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            margin-left: 40px;
            margin-right: 40px;
        }

        .section-pill {
            background-color: var(--blue);
            color: var(--gold);
            border-radius: var(--radius);
            padding: 4px 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .show-more {
            color: var(--gold);
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }


        /* Card grid styles */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-left: 100px;
            margin-right: 100px;
        }

        /* 2 columns on small screens */
        @media (max-width: 576px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .trip-card {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            background-color: var(--blue);
        }

        .trip-card:hover {
            transform: scale(1.05);
            transition: transform 0.4s ease;
        }

        .trip-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }

        .trip-card:hover img {
            opacity: 0.3;
        }

        .trip-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(transparent, rgba(30, 58, 138, 0.500));
            color: var(--white);
            transition: opacity 1s ease;
        }
        
        .trip-card-overlay h6 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
        }
        .trip-card:hover .trip-card-overlay {
            opacity: 0;
        }

        /* Full info overlay on hover */
        .trip-card-hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(30, 58, 138, 0.800);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 16px;
        }

        .trip-card:hover .trip-card-hover-overlay {
            opacity: 1;
        }

        .hover-overlay-content {
            text-align: center;
            width: 100%;
        }

        .hover-overlay-content h5 {
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
        }

        .hover-city-duration {
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--white);
        }

        /* Icon spacing in city-duration line */
        .hover-city-duration i { 
            margin-right: 4px;
        }

        .hover-description {
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--white);
            display: -webkit-box; /* اذا زاد طول النص عن 3 يقتطع الباقي */
            -webkit-line-clamp: 3; /* Limit text to 3 lines */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hover-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat strong {
            font-size: 15px;
            color: var(--gold);
        }

        .stat small {
            font-size: 11px;
            color: var(--white);
            margin-top: 2px;
        }

        .btn-view-more {
            background-color: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: var(--radius);
            padding: 6px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn-view-more:hover {
            background-color: #fffb00;
        }

        /* Footer styles */
        .footer-sindbad {
            background-color: var(--blue);
            padding: 30px 0 20px;
            margin-top: auto;
            color: var(--white);
        }

        .footer-logo-circle {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 8px;
            color: var(--gold);
        }

        .footer-brand-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--gold);
            text-align: center;
        }

        .footer-socials a {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin: 0 5px;
            text-decoration: none;
        }

        .footer-socials a:hover {
            color: var(--gold);
        }

        .footer-box h6 {
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
            font-size: 14px;
        }

        .footer-box a {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 13px;
            line-height: 2.1;
        }

        .footer-box a:hover {
            color: var(--gold);
        }
    </style>
</head>

<body>

    <!-- ======== NAVBAR ======== -->
    <nav class="navbar navbar-sindbad navbar-expand-md">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-logo d-flex align-items-center gap-2" href="base.html">
                <img src="logo.png" alt="Sindbad Logo" width="32" height="32" />
                <span>Sindbad</span>

            </a>

            <!-- Mobile toggle -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list fs-4 text-white"></i> <!-- زر على الجوال فقط يظهر قائمة ال navMenu -->
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav mx-auto gap-1">
                    <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Hotels</a></li>
                </ul>

                <!-- Auth buttons -->
                <div class="d-flex gap-2">
                    <button class="btn-logout" onclick="window.location='home.html'">Logout</button>
                </div>
            </div>

        </div>
    </nav>


    <!-- ======== MAIN CONTENT ======== -->
    <main class="container-fluid py-4">
        <section id="mainCarousel" class="carousel slide carousel-sindbad mb-4" data-bs-ride="carousel"
            data-bs-interval="4000" data-bs-pause="hover">

            <!-- Indicator dots -->
            <div class="carousel-indicators" id="carousel-indicators"></div>

            <!-- Slides – filled by home.js -->
            <div class="carousel-inner" id="carousel-inner">
                <!-- Default loading state -->
                <div class="carousel-item active">
                    <div class="carousel-slide">
                        <div class="carousel-slide-text">
                            <div class="spinner-border text-white" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Previous / Next arrows -->
            <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </section>

        <!-- ======== EXPLORE SECTION ======== -->
        <section class="section-header">
            <span class="section-pill">Explore</span>
            <a href="explore.html" class="show-more">Show more</a>
        </section>

        <section class="card-grid mb-4" id="top-trips-grid">
            <!-- filled by home.js -->
        </section>


        <!-- ======== HOTELS SECTION ======== -->
        <section class="section-header">
            <span class="section-pill">Hotels</span>
            <a href="#" class="show-more">Show more Hotels</a>
        </section>

        <section class="card-grid mb-4" id="top-hotels-grid">
            <!-- filled by home.js -->
        </section>

    </main>

    <footer class="footer-sindbad mt-4">
        <div class="container">
            <div class="row g-3 align-items-stretch">

                <!-- Brand + socials -->
                <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
                    <div class="footer-logo-circle"><img src="logo.png" alt="Sindbad Logo" width="52" height="52" />
                    </div>
                    <div class="footer-brand-name">Sindbad</div>
                    <div class="footer-socials mt-2 text-center">
                        <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
                        <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
                        <a href="#" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>

                <!-- Company links -->
                <div class="col-6 col-md-4">
                    <div class="footer-box">
                        <h6>Company</h6>
                        <a href="#">About us</a>
                        <a href="#">Our team</a>
                        <a href="#">Contact</a>
                    </div>
                </div>

                <!-- Contact links -->
                <div class="col-6 col-md-4">
                    <div class="footer-box">
                        <h6>Contact</h6>
                        <a href="#">Phone</a>
                        <a href="#">Email</a>
                        <a href="#">Location</a>
                    </div>
                </div>

            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared fetch helpers -->
    <script src="assets/js/api.js"></script>
    <!-- Page logic -->
    <script src="assets/js/home.js"></script>

</body>

</html>
