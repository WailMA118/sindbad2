<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sindbad – Home</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    /* =============================================
       CSS Variables – Single source of truth
       ============================================= */
    :root {
      --blue:   #1E3A8A; /*  الوان من الهوية الفلسطينية مثل لون بلاط قبة الصخرة ولون القبة ولون اوراق وشجر الزيتون */
      --gold:   #D4AF37;  
      --brown:  #8B5A2B;
      --olive:  #6B8E23;
      --cream:  #F8F5F0;
      --white:  #ffffff;
      --dark:   #1a1a1a;
      --radius: 14px;
    }

    /* =============================================
       General
       ============================================= */
    body {
      background-color: var(--cream);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }

    main { flex: 1; } /* makes main take all available vertical space, pushing footer to bottom */

    /* =============================================
       Navbar
       ============================================= */
    .navbar-sindbad {
      background-color: var(--blue);
    }

    .navbar-sindbad .navbar-brand {
      color: var(--gold);
      font-weight: 700;
      font-size: 19px;
    }

    .navbar-sindbad .nav-link {
      color: rgba(255, 255, 255, 0.85) !important;
      border-radius: 20px;
      padding: 4px 14px !important;
    }

    .navbar-sindbad .nav-link:hover,
    .navbar-sindbad .nav-link.active {
      color: var(--white) !important;
      background-color: rgba(255, 255, 255, 0.15);
    }

    .btn-logout {
      background-color: #c0392b;
      color: var(--white);
      border: none;
      border-radius: 20px;
      padding: 5px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-logout:hover { opacity: 0.85; }

    /* =============================================
       Carousel
       ============================================= */
    .carousel-sindbad {
      border-radius: var(--radius);
      overflow: hidden;
    }

    .carousel-sindbad .carousel-item {
      height: 260px;
    }

    .carousel-slide {
      width: 100%;
      height: 260px;
      background-color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .carousel-slide img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.65;
    }

    .carousel-slide-text {
      position: relative;
      z-index: 2;
      color: var(--white);
      text-align: center;
      padding: 0 40px;
      max-width: 580px;
    }

    .carousel-slide-text h4 {
      font-weight: 700;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .carousel-slide-text p {
      font-size: 14px;
      opacity: 0.9;
      margin: 0;
      /* Limit text to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* =============================================
       Section Header
       ============================================= */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-pill {
      background-color: var(--blue);
      color: var(--white);
      border-radius: 20px;
      padding: 4px 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .show-more {
      color: var(--brown);
      font-size: 13px;
      text-decoration: none;
    }

    .show-more:hover {
      color: var(--blue);
      text-decoration: underline;
    }

    /* =============================================
       Trip / Hotel Cards  – CSS Grid Layout
       
       CSS Grid is used here because:
       - We need a strict 3-column layout on desktop
       - We need a 2-column layout on mobile
       - aspect-ratio on cells requires grid, not Bootstrap cols
       ============================================= */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* 2 columns on small screens */
    @media (max-width: 576px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .trip-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 1 / 1;      /* square cards – works perfectly with CSS Grid */
      cursor: pointer;
      background-color: #333;
    }

    .trip-card:hover {
      transform: scale(1.02);
      transition: transform 0.2s ease;
    }

    .trip-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }

    /* Text overlay at bottom of each card */
    .trip-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.72));
      color: var(--white);
    }

    .trip-card-overlay h6 {
      margin: 0 0 2px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trip-card-overlay small {
      font-size: 12px;
      opacity: 0.88;
    }

    /* =============================================
       Footer
       ============================================= */
    .footer-sindbad {
      background-color: var(--blue);
      padding: 30px 0 20px;
      margin-top: auto;
      color: var(--white);
    }

    .footer-logo-circle {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 8px;
      color: var(--gold);
    }

    .footer-brand-name {
      font-weight: 700;
      font-size: 16px;
      color: var(--gold);
      text-align: center;
    }

    .footer-socials a {
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      margin: 0 5px;
      text-decoration: none;
    }

    .footer-socials a:hover { color: var(--gold); }

    .footer-box h6 {
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
      font-size: 14px;
    }

    .footer-box a {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 13px;
      line-height: 2.1;
    }

    .footer-box a:hover { color: var(--gold); }

    /* =============================================
       Spinner / Empty
       ============================================= */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    .empty-msg {
      text-align: center;
      color: #777;
      padding: 40px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- ======== NAVBAR ======== -->
  <nav class="navbar navbar-sindbad navbar-expand-md">
    <div class="container">

      <a class="navbar-brand d-flex align-items-center gap-2" href="base.html">
        <span>⛵</span>
        Sindbad
      </a>

      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list fs-4 text-white"></i>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Hotels</a></li>
        </ul>
        <!-- Logout button -->
        <div>
          <button class="btn-logout" onclick="window.location='base.html'">Logout</button>
        </div>
      </div>

    </div>
  </nav>


  <main class="container py-4">

    <!-- ======== CAROUSEL ======== -->
    <!--
      data-bs-pause="hover"  → pauses auto-play when the user hovers (UX fix)
      data-bs-ride="carousel" → starts auto-play on page load
      data-bs-interval="5000" → 5 seconds per slide
    -->
    <div id="mainCarousel"
         class="carousel slide carousel-sindbad mb-4"
         data-bs-ride="carousel"
         data-bs-interval="5000"
         data-bs-pause="hover">

      <!-- Indicator dots -->
      <div class="carousel-indicators" id="carousel-indicators"></div>

      <!-- Slides – filled by home.js -->
      <div class="carousel-inner" id="carousel-inner">
        <!-- Default loading state -->
        <div class="carousel-item active">
          <div class="carousel-slide">
            <div class="carousel-slide-text">
              <div class="spinner-border text-white" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Previous / Next arrows -->
      <button class="carousel-control-prev" type="button"
              data-bs-target="#mainCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button"
              data-bs-target="#mainCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>


    <!-- ======== EXPLORE SECTION ======== -->
    <!--
      .section-header uses flexbox (justify-content-between) for the
      label + "show more" layout.
      .card-grid below uses CSS Grid (3 cols desktop / 2 cols mobile).
    -->
    <div class="section-header">
      <span class="section-pill">Explore</span>
      <a href="explore.html" class="show-more">Show more</a>
    </div>

    <div class="card-grid mb-4" id="top-trips-grid">
      <!-- filled by home.js -->
    </div>


    <!-- ======== HOTELS SECTION ======== -->
    <div class="section-header">
      <span class="section-pill">Hotels</span>
      <a href="#" class="show-more">Show more Hotels</a>
    </div>

    <div class="card-grid mb-4" id="top-hotels-grid">
      <!-- filled by home.js -->
    </div>

  </main>


  <!-- ======== FOOTER ======== -->
  <!--
    Bootstrap row g-3 handles the 3-column footer layout.
    col-md-4 → 3 equal columns on ≥768px
    col-6   → 2 columns on <768px (brand takes full width via col-md-4 only)
  -->
  <footer class="footer-sindbad">
    <div class="container">
      <div class="row g-3 align-items-stretch">

        <!-- Brand -->
        <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
          <div class="footer-logo-circle">⛵</div>
          <div class="footer-brand-name">Sindbad</div>
          <div class="footer-socials mt-2 text-center">
            <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" aria-label="Twitter/X"><i class="bi bi-twitter-x"></i></a>
          </div>
        </div>

        <!-- Company -->
        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Company</h6>
            <a href="#">About us</a>
            <a href="#">Our team</a>
            <a href="#">Contact</a>
          </div>
        </div>

        <!-- Contact -->
        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Contact</h6>
            <a href="#">Phone</a>
            <a href="#">Email</a>
            <a href="#">Location</a>
          </div>
        </div>

      </div>
    </div>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/home.js"></script>

</body>
</html>
