<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sindbad – Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ══════════════════ NAVBAR ══════════════════ -->
  <nav class="navbar navbar-sindbad navbar-expand-md">
    <div class="container">

      <a class="navbar-brand" href="base.html">
        <span class="brand-icon">⛵</span>
        Sindbad
      </a>

      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Hotels</a></li>
        </ul>
        <div>
          <button class="btn-nav-logout" onclick="window.location='base.html'">Logout</button>
        </div>
      </div>

    </div>
  </nav>

  <main class="container py-4">

    <!-- ══════════════════ CAROUSEL ══════════════ -->
    <div id="mainCarousel" class="carousel slide carousel-sindbad mb-4"
         data-bs-ride="carousel" data-bs-interval="5000">

      <!-- Indicators -->
      <div class="carousel-indicators" id="carousel-indicators"></div>

      <!-- Slides -->
      <div class="carousel-inner" id="carousel-inner">
        <!-- Filled by home.js -->
        <div class="carousel-item active">
          <div class="carousel-slide">
            <div class="carousel-slide-text">
              <div class="spinner-border text-white" role="status"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button"
              data-bs-target="#mainCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button"
              data-bs-target="#mainCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>

    <!-- ══════════════════ EXPLORE SECTION ══════ -->
    <div class="section-header">
      <span class="section-pill">Explore</span>
      <a href="explore.html" class="show-more">Show more</a>
    </div>

    <div class="card-grid mb-4" id="top-trips-grid">
      <!-- Filled by home.js -->
    </div>

    <!-- ══════════════════ HOTELS SECTION ════════ -->
    <div class="section-header">
      <span class="section-pill">Hotels</span>
      <a href="#" class="show-more">Show more Hotels</a>
    </div>

    <div class="card-grid mb-4" id="top-hotels-grid">
      <!-- Filled by home.js -->
    </div>

  </main>

  <!-- ══════════════════ FOOTER ══════════════════ -->
  <footer class="footer-sindbad">
    <div class="container">
      <div class="row g-3 align-items-stretch">

        <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
          <div class="footer-brand">
            <div class="footer-brand-circle">⛵</div>
            <div class="footer-brand-name">Sindbad</div>
            <div class="footer-socials mt-2">
              <a href="#"><i class="bi bi-instagram"></i></a>
              <a href="#"><i class="bi bi-facebook"></i></a>
              <a href="#"><i class="bi bi-twitter-x"></i></a>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Company</h6>
            <a href="#">About us</a>
            <a href="#">Our team</a>
            <a href="#">Contact</a>
          </div>
        </div>

        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Contact</h6>
            <a href="#">Phone</a>
            <a href="#">Email</a>
            <a href="#">Location</a>
          </div>
        </div>

      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>
