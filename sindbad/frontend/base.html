<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sindbad</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- ══════════════════ NAVBAR ══════════════════ -->
  <nav class="navbar navbar-sindbad navbar-expand-md">
    <div class="container">

      <!-- Brand -->
      <a class="navbar-brand" href="base.html">
        <span class="brand-icon">⛵</span>
        Sindbad
      </a>

      <!-- Toggler (mobile) -->
      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              style="color:#fff">
        <i class="bi bi-list fs-4"></i>
      </button>

      <!-- Links -->
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Hotels</a></li>
        </ul>
        <!-- Auth buttons -->
        <div class="d-flex gap-2">
          <button class="btn-nav-login" onclick="window.location='home.html'">Login</button>
          <button class="btn-nav-register">Register</button>
        </div>
      </div>

    </div>
  </nav>

  <main>

    <!-- ══════════════════ HERO ══════════════════ -->
    <section class="hero-section">
      <h2>كلام تشجيعي على السياحة في فلسطين&nbsp;—&nbsp;اكتشف جمال أرض الأنبياء</h2>
      <button class="btn-start-journey" onclick="window.location='home.html'">
        Start your journey
      </button>
    </section>

    <!-- ══════════════════ FEATURE CARDS ══════════ -->
    <div class="container my-4">
      <div class="row g-3">

        <!-- Trip card -->
        <div class="col-6">
          <div class="feature-card">
            <div class="feature-card-img" id="featured-trip-img"></div>
            <div class="feature-card-body">
              <p id="featured-trip-name">Loading…</p>
              <a href="explore.html" class="btn-feature">Explore</a>
            </div>
          </div>
        </div>

        <!-- Hotel card -->
        <div class="col-6">
          <div class="feature-card">
            <div class="feature-card-img" id="featured-hotel-img"></div>
            <div class="feature-card-body">
              <p id="featured-hotel-name">Loading…</p>
              <a href="#" class="btn-feature">Hotels</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ══════════════════ SCROLL STRIP ══════════ -->
    <div class="container">
      <div class="scroll-strip" id="scroll-strip">
        <!-- Filled by base.js -->
      </div>
    </div>

  </main>

  <!-- ══════════════════ FOOTER ══════════════════ -->
  <footer class="footer-sindbad mt-4">
    <div class="container">
      <div class="row g-3 align-items-stretch">

        <!-- Brand + socials -->
        <div class="col-md-4 d-flex flex-column align-items-center justify-content-center">
          <div class="footer-brand">
            <div class="footer-brand-circle">⛵</div>
            <div class="footer-brand-name">Sindbad</div>
            <div class="footer-socials mt-2">
              <a href="#"><i class="bi bi-instagram"></i></a>
              <a href="#"><i class="bi bi-facebook"></i></a>
              <a href="#"><i class="bi bi-twitter-x"></i></a>
            </div>
          </div>
        </div>

        <!-- Company -->
        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Company</h6>
            <a href="#">About us</a>
            <a href="#">Our team</a>
            <a href="#">Contact</a>
          </div>
        </div>

        <!-- Contact -->
        <div class="col-6 col-md-4">
          <div class="footer-box">
            <h6>Contact</h6>
            <a href="#">Phone</a>
            <a href="#">Email</a>
            <a href="#">Location</a>
          </div>
        </div>

      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/base.js"></script>
</body>
</html>
